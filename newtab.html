<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Start</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="top-controls">
      <div class="top-region">
        <label class="region-label sr-only" for="regionSelect">Регион</label>
        <select id="regionSelect" class="region-select" aria-label="Выбор региона"></select>
      </div>
      <div class="top-spacer" aria-hidden="true"></div>
      <button
        id="themeToggle"
        class="theme-toggle"
        type="button"
        aria-label="Переключить тему"
        aria-pressed="false"
      >
        <span class="theme-toggle-mark" aria-hidden="true"></span>
      </button>
    </div>
    <div id="themeWave" class="theme-wave" aria-hidden="true"></div>

    <main class="page">
      <section class="clock-section">
        <h1 id="clock" class="clock">00:00</h1>
        <div class="clock-meta">
          <p id="dateLabel" class="date-label">Понедельник, 1 января</p>
          <p id="weatherLabel" class="weather-label"></p>
        </div>
        <p id="greetingLabel" class="greeting-label"></p>
      </section>

      <section class="links-section">
        <div id="linksList" class="links-grid" aria-live="polite"></div>
      </section>

      <section class="news-section">
        <div class="section-top">
          <div>
            <p id="newsKicker" class="kicker">Последние новости</p>
          </div>
        </div>
        <div id="newsList" class="news-list"></div>
      </section>
    </main>

    <div id="linkSheetBackdrop" class="sheet-backdrop" hidden></div>
    <section id="linkSheet" class="link-sheet" hidden aria-hidden="true">
      <div class="link-sheet-card">
        <button id="closeLinkSheet" class="sheet-close" type="button" aria-label="Закрыть">×</button>
        <p id="linkSheetKicker" class="kicker">Быстрая ссылка</p>
        <h2 id="linkSheetTitle" class="sheet-title">Новая ссылка</h2>

        <form id="linkForm" class="sheet-form">
          <input
            id="linkTitle"
            class="text-input"
            type="text"
            maxlength="30"
            placeholder="Название"
            required
          />
          <input
            id="linkUrl"
            class="text-input"
            type="text"
            placeholder="example.com или https://example.com"
            required
          />
          <div class="sheet-actions">
            <button id="cancelEditButton" class="ghost-button" type="button">Отмена</button>
            <button id="saveLinkButton" class="refresh-button" type="submit">Добавить</button>
          </div>
        </form>
      </div>
    </section>

    <template id="newsItemTemplate">
      <article class="news-item">
        <a class="news-link" target="_self" rel="noreferrer"></a>
        <div class="news-footer">
          <span class="news-source"></span>
          <time class="news-time"></time>
        </div>
      </article>
    </template>

    <template id="linkItemTemplate">
      <article class="link-card">
        <a class="link-card-main" target="_self" rel="noreferrer">
          <span class="link-card-title"></span>
          <span class="link-card-url"></span>
        </a>
        <div class="link-card-actions">
          <button class="link-action" data-action="edit" type="button"></button>
          <button class="link-action link-action-danger" data-action="delete" type="button"></button>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
